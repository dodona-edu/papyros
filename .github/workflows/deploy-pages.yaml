name: Deploy on GitHub Pages
on:
  workflow_dispatch:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://docs.dodona.be/papyros/
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
      - name: Clone main
        uses: actions/checkout@v6
        with:
          repository: dodona-edu/papyros
          path: papyros
          ref: main
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: yarn
          cache-dependency-path: papyros/yarn.lock
      - name: Install dependencies
        run: |
          cd papyros
          yarn install
      - name: Resolve Pyodide Python version
        id: pyver
        run: echo "version=$(jq -r '.info.python' papyros/node_modules/pyodide/pyodide-lock.json)" >> "$GITHUB_OUTPUT"
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ steps.pyver.outputs.version }}
      - name: Build branch
        run: |
          cd papyros
          yarn setup
          yarn build:app
          cd ..
      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: papyros/dist # The folder the action should deploy.
