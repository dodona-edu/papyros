name: Test

on:
  push:
  workflow_call:

jobs:
  javascript:
    name: JavaScript
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Set up Node
      uses: actions/setup-node@v6
      with:
        node-version: 24.x
        cache: yarn
    - name: Install dependencies
      run: |
        yarn install
        yarn playwright install
    - name: Build service worker
      run: |
        yarn build:sw
    - name: Resolve Pyodide Python version
      id: pyver
      run: |
        PYVER=$(jq -r '.info.python' node_modules/pyodide/pyodide-lock.json)
        TOOLVER=$(awk '/^python / {print $2}' .tool-versions)
        if [ "$PYVER" != "$TOOLVER" ]; then
          echo "::error::Python version drift: Pyodide ships $PYVER but .tool-versions pins $TOOLVER"
          exit 1
        fi
        echo "version=$PYVER" >> "$GITHUB_OUTPUT"
    - uses: actions/setup-python@v6
      with:
        python-version: ${{ steps.pyver.outputs.version }}
    - name: Build python backend
      run: |
        yarn setup
    - name: Test
      run: |
        yarn test
